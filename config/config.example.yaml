protocol: openai
model: deepseek-v4
base_url: https://api.deepseek.com/v1
api_key: YOUR_API_KEY
# Optional settings
session_mode: ephemeral
enable_extended_thinking: false
thinking_budget_tokens: 1024
storage_path: data/sessions

